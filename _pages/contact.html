<!-- ═══ Contact Form ═══ -->
<div class="exp-section">
    <span class="exp-section__title">Send a Message</span>

    <form class="contact-form" action="https://formsubmit.co/phgnam1811.vn@gmail.com" method="POST">

        <!-- honeypot spam protection -->
        <input type="text" name="_honey" style="display:none">
        <!-- <input type="hidden" name="_captcha" value="false"> -->
        <input type="hidden" name="_subject" value="New message from portfolio contact form">
        <input type="hidden" name="_next" value="https://hiimmuc.github.io/contact/?sent=1">

        <div class="contact-form__row">
            <div class="contact-form__field">
                <label class="contact-form__label" for="cf-name">Full name</label>
                <input class="contact-form__input" type="text" id="cf-name" name="name" placeholder="Your name" required
                    autocomplete="name">
            </div>
            <div class="contact-form__field">
                <label class="contact-form__label" for="cf-email">Email address</label>
                <input class="contact-form__input" type="email" id="cf-email" name="email" placeholder="you@example.com"
                    required autocomplete="email">
            </div>
        </div>

        <div class="contact-form__field">
            <label class="contact-form__label" for="cf-message">Your message</label>
            <textarea class="contact-form__textarea" id="cf-message" name="message"
                placeholder="Write your message here…" required></textarea>
        </div>

        <div class="contact-form__submit">
            <button type="submit" class="btn btn--primary">Send Message</button>
        </div>

    </form>
</div><!-- /.exp-section -->
