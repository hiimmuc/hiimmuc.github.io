<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Head -->
  <circle cx="100" cy="100" r="85" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Left Eye (black) -->
  <circle cx="75" cy="85" r="18" fill="black"/>
  <circle cx="77" cy="82" r="5" fill="white"/>
  
  <!-- Right Eye (black) -->
  <circle cx="125" cy="85" r="18" fill="black"/>
  <circle cx="127" cy="82" r="5" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="110" rx="8" ry="10" fill="black"/>
  
  <!-- Mouth -->
  <path d="M 100 110 Q 90 125 85 120" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 110 Q 110 125 115 120" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Ears -->
  <circle cx="50" cy="50" r="20" fill="black"/>
  <circle cx="150" cy="50" r="20" fill="black"/>
</svg>
